[toolchain]
anchor_version = "0.30.1"

[features]
resolution = true
skip-lint = false

[programs.devnet]
signal_markets = "86hERt8cdRZUBpc1Ng8coX2jwLmWGUcyc9JNfspw39yr"
# TXLINE_PROGRAM_ID — the CPI validation target. On devnet this is our deployed mock_validator
# (approves any proof, demo only); swap for the real TxLINE validator before mainnet.
txline_program = "FPnwSSp2DXcNvJnxXWc2JXvU4MLNfrWDT6wBcU5Eptse"

[programs.localnet]
signal_markets = "Fg6PaFpoGXkYsidMpWTK6W2BeZ7FEfcYkg476zPFsLnS"
txline_program = "FPnwSSp2DXcNvJnxXWc2JXvU4MLNfrWDT6wBcU5Eptse"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "Devnet"
wallet = "~/.config/solana/id.json"

[scripts]
test = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.ts"
